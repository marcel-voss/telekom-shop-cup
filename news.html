<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Telekom Shop Cup – News</title>
<style>
  :root{
    --magenta:#E20074; --magenta-deep:#8a0048;
    --ink:#13131a; --ink-soft:#2a2a33; --muted:#7a7a85; --line:#ededf0; --bg:#f3f3f6; --card:#fff;
    --pitch:#0fa45a; --gold:#f5c542;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .nav{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
  .brand{font-weight:800}
  .navlinks{display:flex;gap:8px}
  .navlinks a{text-decoration:none;font-size:14px;font-weight:700;color:var(--ink-soft);padding:8px 14px;border-radius:999px}
  .navlinks a.active{background:var(--magenta);color:#fff}
  .navlinks a:not(.active):hover{background:#f3eef1}
  @media(max-width:560px){
    .nav{flex-wrap:wrap;gap:8px;padding:10px 12px}
    .navlinks{width:100%;flex-wrap:wrap;gap:6px}
    .navlinks a{padding:7px 11px;font-size:13px}
    .hero h1{font-size:28px}
    .news-card{padding:18px 16px}
    .ticker .lbl{font-size:11px;padding:0 10px}
    .ticker-track span{font-size:13px;padding:12px 16px}
  }

  /* Gewinn-Banner */
  .prizebanner{position:relative;overflow:hidden;background:radial-gradient(circle at 18% 20%,#33333f,#14141a 72%);color:#fff;display:flex;align-items:center;gap:22px;padding:16px 26px;border-bottom:3px solid var(--gold)}
  .pb-art{display:flex;align-items:center;gap:6px;flex:none;z-index:2}
  .pb-art svg{width:56px;height:56px;filter:drop-shadow(0 5px 10px rgba(0,0,0,.45))}
  .pb-text{flex:1;min-width:0;z-index:2}
  .pb-eyebrow{color:var(--gold);font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase}
  .pb-title{font-size:22px;font-weight:900;line-height:1.05;margin:2px 0}
  .pb-title .amp{color:var(--gold)}
  .pb-sub{font-size:13px;opacity:.82}
  .pb-glow{position:absolute;right:-50px;top:-70px;width:240px;height:240px;background:radial-gradient(circle,rgba(226,0,116,.5),transparent 70%);pointer-events:none}
  @media(max-width:640px){.pb-title{font-size:18px}.pb-art svg{width:46px;height:46px}}

  .hero{background:linear-gradient(135deg,#E20074,#b3005c 55%,#8a0048);color:#fff;padding:26px 20px;text-align:center}
  .hero .eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;opacity:.9;font-weight:700}
  .hero h1{font-size:32px;font-weight:900;margin:6px 0 2px}
  .hero .sub{font-size:14px;opacity:.95}

  .wrap{max-width:760px;margin:0 auto;padding:24px 16px 70px}
  .news-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 24px;margin-bottom:20px;box-shadow:0 3px 14px rgba(20,20,40,.05)}
  .news-card h2{font-size:21px;font-weight:800;margin-bottom:4px}
  .news-date{font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:12px}
  .news-text{font-size:15px;color:#2a2a33;white-space:pre-wrap;margin-bottom:6px}
  .news-media{display:grid;grid-template-columns:1fr;gap:12px;margin-top:14px}
  .news-media img,.news-media video{width:100%;border-radius:12px;display:block;background:#000}
  .news-media img{object-fit:cover;max-height:520px}
  .empty{text-align:center;color:var(--muted);padding:50px 16px;font-size:15px}
  .ticker{background:linear-gradient(90deg,#13131a,#2b2b35);border-radius:14px;margin:0 0 24px;display:flex;align-items:stretch;overflow:hidden;box-shadow:0 3px 14px rgba(20,20,40,.08)}
  .ticker .lbl{background:var(--magenta);color:#fff;font-weight:900;font-size:12px;letter-spacing:1px;padding:0 14px;display:flex;align-items:center;gap:7px;white-space:nowrap;flex:none}
  .ticker .lbl .dot{width:8px;height:8px;border-radius:50%;background:#3df08a;animation:tpulse 1.4s infinite}
  @keyframes tpulse{0%,100%{opacity:1}50%{opacity:.25}}
  .ticker .vp{overflow:hidden;flex:1;display:flex;align-items:center}
  .ticker-track{display:inline-flex;white-space:nowrap;animation:scrollx 38s linear infinite}
  .ticker-track span{padding:13px 24px;font-size:14px;font-weight:600;color:#eaeaf0}
  .ticker-track span b{color:var(--gold);font-weight:800}
  @keyframes scrollx{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .ticker:hover .ticker-track{animation-play-state:paused}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:26px}
  .gewinnbanner{background:linear-gradient(100deg,#1b1b22,#2b2b35);border-bottom:3px solid var(--gold)}
  .gb-inner{max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:13px;padding:11px 18px}
  .gb-medal{font-size:26px;flex:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
  .gb-txt{display:flex;flex-direction:column;line-height:1.25;min-width:0}
  .gb-eyebrow{color:var(--gold);font-size:10.5px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
  .gb-title{color:#fff;font-weight:800;font-size:clamp(14px,3.6vw,18px)}
  .gb-title em{font-style:normal;font-weight:600;color:#b9b9c4;font-size:.9em}
  @media(max-width:560px){.gb-inner{padding:10px 14px;gap:10px}.gb-medal{font-size:22px}}
</style>
</head>
<body>
  <nav class="nav" id="topnav"></nav>

  <div class="gewinnbanner">
    <div class="gb-inner">
      <span class="gb-medal">🏆</span>
      <div class="gb-txt"><span class="gb-eyebrow">Zu gewinnen</span><span class="gb-title">Team-Trikots + Sprint-Pokal <em>· für die 4 Gruppensieger</em></span></div>
    </div>
  </div>

  <header class="hero">
    <div class="eyebrow">Rund um den Shop Cup</div>
    <h1>News & Updates</h1>
    <div class="sub">Aktuelles vom Team – Texte, Bilder und Videos</div>
  </header>

  <div class="wrap">
    <div class="ticker">
      <div class="lbl"><span class="dot"></span>LIVE-TICKER</div>
      <div class="vp"><div class="ticker-track" id="ticker"><span>Lade Live-Ticker …</span></div></div>
    </div>
    <div id="news"><div class="empty">Lade News …</div></div>
  </div>

  <footer>Voss Telekom · Shop Cup News</footer>

<script>
(function(){
  var clash = new URLSearchParams(location.search).get('cup')==='clash';
  var nav=document.getElementById('topnav');
  function pill(href,label,bg){ return '<a href="'+href+'" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-weight:800;font-size:13px;padding:8px 15px;border-radius:999px;white-space:nowrap;background:'+bg+';color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.2)">'+label+'</a>'; }
  var links, sw;
  if(clash){
    document.documentElement.style.setProperty('--magenta','#0a9d57');
    document.title='Magenta Cup Clash – News';
    sw=pill('index.html','← Shop Cup','#E20074');
    links='<a href="cupclash.html">Tabelle</a><a href="cupclash-rankings.html">Rankings</a><a href="news.html?cup=clash" class="active">News</a><a href="cupclash-erklaer.html">So geht\'s</a>';
    var hero=document.querySelector('.hero'); if(hero){ hero.style.background='linear-gradient(135deg,#10a85e,#0a8f4c 55%,#076b3b)'; var ey=hero.querySelector('.eyebrow'); if(ey)ey.textContent='Rund um den Cup Clash'; }
    var gbe=document.querySelector('.gb-eyebrow'); if(gbe)gbe.textContent='Die Prämie';
    var gbt=document.querySelector('.gb-title'); if(gbt)gbt.innerHTML='Bronze · Silber · Gold <em>· pro Stück ausgezahlt</em>';
    var tk=document.querySelector('.ticker'); if(tk)tk.style.display='none';
  } else {
    sw=pill('cupclash.html','Cup Clash →','#0a9d57');
    links='<a href="index.html">Tabelle</a><a href="stats.html">Rankings</a><a href="news.html?cup=shop" class="active">News</a><a href="erklaer.html">So geht\'s</a>';
  }
  nav.innerHTML=sw+'<div class="navlinks">'+links+'</div>';
})();
</script>
<script src="config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  function fmt(ts){ return new Date(ts).toLocaleString("de-DE",{weekday:"short",day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"})+" Uhr"; }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }

  function buildTicker(sd){
    const track=document.getElementById("ticker"); if(!track) return;
    const lines=[];
    const winners=window.computeGroupWinners(sd);
    const arr=window.SHOPS.map(function(s){var p=window.shopPercents(sd[s.id]||{});var sc=window.computeScore(p.bb,p.tv);return {s:s,p:p,sc:sc,cheers:((sd[s.id]||{}).cheers)||0};});
    const qual=arr.filter(function(a){return a.sc.qualified;}).sort(function(a,b){return b.sc.total-a.sc.total;});
    if(qual.length) lines.push("👑 Gesamtführung: <b>"+qual[0].s.name+"</b> ("+qual[0].sc.total+" Pkt)");
    window.GROUPS.forEach(function(g){ if(winners[g]){var nm=window.SHOPS.find(function(s){return s.id===winners[g];}).name; lines.push("🏆 Gruppe "+g+": <b>"+nm+"</b> vorn");}});
    arr.forEach(function(a){ if(a.p.bb>=100) lines.push("🚀 <b>"+a.s.name+"</b> hat Breitband geknackt!"); if(a.p.tv>=100) lines.push("🚀 <b>"+a.s.name+"</b> hat MagentaTV geknackt!"); });
    var today=new Date().toISOString().slice(0,10), mover=null;
    arr.forEach(function(a){var d=sd[a.s.id]||{}; if(d.dayBaseline&&d.dayBaseline.date===today){var g=Math.round((a.sc.total-(d.dayBaseline.total||0))*10)/10; if(g>0&&(!mover||g>mover.g)) mover={n:a.s.name,g:g};}});
    if(mover) lines.push("📈 Aufsteiger des Tages: <b>"+mover.n+"</b> (+"+mover.g+")");
    var now=new Date(),start=new Date(window.EVENT.start),end=new Date(window.EVENT.end);
    if(now<start){var d1=Math.ceil((start-now)/86400000); lines.push("⏱️ Anpfiff in "+d1+" Tag"+(d1===1?"":"en"));}
    else if(now<=end){var d2=Math.ceil((end-now)/86400000); lines.push("⏱️ Noch "+d2+" Tag"+(d2===1?"":"e")+" im Rennen");}
    var generic=["⚽ Jeder Abschluss zählt!","💪 Wer schnappt sich Platz 1?","🔥 Gebt Vollgas, Team!","🎯 Erst 100 %, dann Punkte sammeln!"];
    var gi=0; while(lines.length<5){ lines.push(generic[gi%generic.length]); gi++; }
    var half=lines.map(function(l){return "<span>"+l+"</span>";}).join("<span>•</span>")+"<span>•</span>";
    track.innerHTML=half+half;
  }

  function render(items){
    const root=document.getElementById("news");
    if(!items.length){ root.innerHTML='<div class="empty">Noch keine News veröffentlicht. Schau bald wieder vorbei! ⚽</div>'; return; }
    let html="";
    items.forEach(function(n){
      let media="";
      (n.media||[]).forEach(function(m){
        if(m.type==="video") media+='<video controls preload="metadata" playsinline src="'+m.url+'"></video>';
        else media+='<img loading="lazy" src="'+m.url+'" alt="'+esc(m.name||"")+'">';
      });
      html+='<div class="news-card">'
          +(n.title?'<h2>'+esc(n.title)+'</h2>':'')
          +'<div class="news-date">'+fmt(n.createdAt)+'</div>'
          +(n.text?'<div class="news-text">'+esc(n.text)+'</div>':'')
          +(media?'<div class="news-media">'+media+'</div>':'')
          +'</div>';
    });
    root.innerHTML=html;
  }

  try{
    const app=initializeApp(window.FIREBASE_CONFIG);
    const db=getFirestore(app);
    const q=query(collection(db,"news"),orderBy("createdAt","desc"));
    onSnapshot(q,function(snap){
      const items=[]; snap.forEach(function(d){ items.push(d.data()); });
      render(items);
    },function(err){ console.error(err); document.getElementById("news").innerHTML='<div class="empty">News konnten nicht geladen werden.</div>'; });
    // Live-Hype-Ticker aus den Shop-Daten
    onSnapshot(collection(db,"shops"),function(snap){
      const sd={}; snap.forEach(function(d){ sd[d.id]=d.data(); }); buildTicker(sd);
    },function(){});
  }catch(e){ console.error(e); document.getElementById("news").innerHTML='<div class="empty">Firebase nicht konfiguriert.</div>'; }
</script>
</body>
</html>
